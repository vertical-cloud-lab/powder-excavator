name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'presentation/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: presentation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: presentation/package-lock.json

      - run: npm ci

      - name: Build slides (HTML, video-capable)
        run: npx marp --html --allow-local-files slides.md -o slides.html

      - name: Stage site
        run: |
          mkdir -p ../_site
          cp slides.html ../_site/index.html
          cp -r assets ../_site/assets
          # Also keep slides.pdf available alongside the deck if it's been built
          if [ -f slides.pdf ]; then cp slides.pdf ../_site/slides.pdf; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
