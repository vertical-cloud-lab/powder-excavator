name: bimodal-compliance

# Installs the open-source Python analysis stack and runs the numerical
# bimodal-compliance check for the secondary compliant-mechanism design.
# See docs/bimodal-compliant-mechanism.md and scripts/bimodal_compliance.py.

on:
  push:
    branches: [main]
    paths:
      - 'scripts/bimodal_compliance.py'
      - 'scripts/beam_fea_crosscheck.py'
      - 'scripts/robustness_sweep.py'
      - 'tests/test_bimodal_compliance.py'
      - 'tests/test_beam_fea_crosscheck.py'
      - 'tests/test_robustness_sweep.py'
      - 'requirements.txt'
      - '.github/workflows/bimodal-compliance.yml'
  pull_request:
    paths:
      - 'scripts/bimodal_compliance.py'
      - 'scripts/beam_fea_crosscheck.py'
      - 'scripts/robustness_sweep.py'
      - 'tests/test_bimodal_compliance.py'
      - 'tests/test_beam_fea_crosscheck.py'
      - 'tests/test_robustness_sweep.py'
      - 'requirements.txt'
      - '.github/workflows/bimodal-compliance.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install CalculiX (for higher-end FEA cross-check)
        run: sudo apt-get update && sudo apt-get install -y calculix-ccx
      - name: Run bistability analyzer
        run: python scripts/bimodal_compliance.py
      - name: Run robustness (uncertainty-quantification) sweep — smoke
        # 16 LHS samples + 3×3×8 grid = ~80 PRBM solves, runs in <2 s.
        run: python -m scripts.robustness_sweep --samples 16 --grid-thick 3 --grid-rise 3 --grid-inner 8
      - name: Run pytest
        run: pytest -v tests/
      - name: Upload energy-landscape plot
        uses: actions/upload-artifact@v4
        with:
          name: bimodal-energy-plot
          path: docs/figures/bimodal-energy.svg
          if-no-files-found: error
      - name: Upload robustness-sweep figures
        uses: actions/upload-artifact@v4
        with:
          name: bimodal-robustness
          path: |
            docs/figures/bimodal-robustness-violin.svg
            docs/figures/bimodal-robustness-heatmap.svg
            docs/figures/bimodal-robustness-summary.json
          if-no-files-found: error
      - name: Upload beam-FEA cross-check figure
        uses: actions/upload-artifact@v4
        with:
          name: bimodal-beam-fea-crosscheck
          path: |
            docs/figures/bimodal-beam-fea-crosscheck.svg
            docs/figures/bimodal-beam-fea-crosscheck.json
          if-no-files-found: warn
