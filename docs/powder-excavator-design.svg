<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" font-family="Helvetica, Arial, sans-serif">
  <!-- =========================================================
       Powder-Excavator: clean recreation of the design sketch
       (powder-excavator-sketch.jpg).

       Concept: a long, half-cylindrical "trough" bucket mounted
       to a vertical arm on a gantry. The arm dips the bucket
       straight down into a powder bed, lifts it (powder is
       retained), then pushes it against a fixed sawtooth
       "ledge" that catches the bucket lip and tips it, pouring
       the powder out at a controlled location.
       ========================================================= -->

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5fbf"/>
    </marker>
    <pattern id="powder" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#e8d9a8"/>
      <circle cx="1.5" cy="1.5" r="0.6" fill="#b89a55"/>
      <circle cx="4" cy="3.5" r="0.6" fill="#b89a55"/>
      <circle cx="2" cy="5"   r="0.5" fill="#b89a55"/>
    </pattern>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-size="38" font-weight="700" fill="#1a1a1a">
    Powder&#8209;Excavator
  </text>
  <line x1="350" y1="70" x2="850" y2="70" stroke="#1a1a1a" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" font-size="16" fill="#555" font-style="italic">
    Mechanical gantry-mounted ladle/trough for scooping &amp; depositing powder
  </text>

  <!-- ==================================================
       Row 1: Orthographic views (front / side / top)
       ================================================== -->
  <g id="orthographic-views">
    <!-- Front view: half-cylinder cross-section -->
    <g transform="translate(150,160)">
      <text x="120" y="0" text-anchor="middle" font-size="20" font-weight="600">Front</text>
      <!-- mounting arm -->
      <rect x="110" y="20" width="20" height="40" fill="url(#metal)" stroke="#333"/>
      <!-- top rim line -->
      <line x1="20" y1="60" x2="220" y2="60" stroke="#222" stroke-width="2"/>
      <!-- semicircle bowl -->
      <path d="M20,60 A100,100 0 0 0 220,60" fill="url(#metal)" stroke="#222" stroke-width="2"/>
      <!-- inner powder line (optional sliver to show wall thickness) -->
      <path d="M28,60 A92,92 0 0 0 212,60" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
      <!-- dim label -->
      <line x1="20" y1="180" x2="220" y2="180" stroke="#1f5fbf" stroke-width="1"
            marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
      <text x="120" y="200" text-anchor="middle" font-size="13" fill="#1f5fbf">diameter D</text>
    </g>

    <!-- Side view: short end -->
    <g transform="translate(530,160)">
      <text x="60" y="0" text-anchor="middle" font-size="20" font-weight="600">Side</text>
      <!-- mounting arm -->
      <rect x="50" y="20" width="20" height="40" fill="url(#metal)" stroke="#333"/>
      <!-- end cap: rectangle with a rounded bottom -->
      <path d="M20,60 L100,60 L100,130 Q60,170 20,130 Z" fill="url(#metal)" stroke="#222" stroke-width="2"/>
      <!-- dim label -->
      <line x1="20" y1="180" x2="100" y2="180" stroke="#1f5fbf" stroke-width="1"
            marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
      <text x="60" y="200" text-anchor="middle" font-size="13" fill="#1f5fbf">width D</text>
    </g>

    <!-- Top view: long rectangle -->
    <g transform="translate(750,160)">
      <text x="170" y="0" text-anchor="middle" font-size="20" font-weight="600">Top</text>
      <!-- elongated trough opening -->
      <rect x="20" y="40" width="300" height="90" rx="6" ry="6"
            fill="#f4e9c8" stroke="#222" stroke-width="2"/>
      <!-- inner edge line -->
      <rect x="28" y="48" width="284" height="74" rx="4" ry="4"
            fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
      <!-- mounting arm (square, top-down) -->
      <rect x="160" y="75" width="20" height="20" fill="url(#metal)" stroke="#333"/>
      <!-- length dim -->
      <line x1="20" y1="160" x2="320" y2="160" stroke="#1f5fbf" stroke-width="1"
            marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
      <text x="170" y="180" text-anchor="middle" font-size="13" fill="#1f5fbf">length L  (≈ 3 × D)</text>
    </g>
  </g>

  <!-- ==================================================
       Row 2: 3D / isometric view of trough + gantry
       ================================================== -->
  <g id="iso-view" transform="translate(0,420)">
    <text x="600" y="0" text-anchor="middle" font-size="22" font-weight="600">
      3D view of bucket on gantry arm
    </text>

    <!-- Gantry frame (suggestive) -->
    <g stroke="#444" stroke-width="2" fill="none">
      <!-- top horizontal beam -->
      <line x1="200" y1="40" x2="1000" y2="40"/>
      <line x1="200" y1="40" x2="200" y2="80"/>
      <line x1="1000" y1="40" x2="1000" y2="80"/>
      <text x="210" y="32" font-size="13" fill="#444">gantry beam (X-axis travel)</text>
    </g>

    <!-- Carriage on gantry -->
    <rect x="540" y="32" width="120" height="22" fill="url(#metal)" stroke="#333"/>
    <text x="600" y="22" text-anchor="middle" font-size="12" fill="#444">carriage (Z-axis lift)</text>

    <!-- Vertical arm -->
    <rect x="585" y="54" width="30" height="160" fill="url(#metal)" stroke="#333"/>

    <!-- Isometric trough bucket -->
    <g transform="translate(380,210)">
      <!-- top rim (parallelogram) -->
      <polygon points="0,0 380,0 440,55 60,55"
               fill="#f4e9c8" stroke="#222" stroke-width="2"/>
      <!-- inner rim line -->
      <polygon points="14,8 366,8 422,49 78,49"
               fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- front curved face of half-cylinder -->
      <path d="M60,55
               C 80,180 420,180 440,55"
            fill="url(#metal)" stroke="#222" stroke-width="2"/>

      <!-- left end cap (semicircle facing viewer-left) -->
      <path d="M0,0
               C -10,60 30,120 60,55 Z"
            fill="url(#metal)" stroke="#222" stroke-width="2"/>

      <!-- right end cap (partially visible) -->
      <path d="M380,0
               C 410,60 470,90 440,55 Z"
            fill="#aab2bd" stroke="#222" stroke-width="2"/>

      <!-- highlight curve on front (subtle) -->
      <path d="M80,90 C 130,140 360,140 410,90"
            fill="none" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- arm-to-bucket attachment indicator -->
    <line x1="600" y1="214" x2="600" y2="220" stroke="#333" stroke-width="2"/>
    <circle cx="600" cy="216" r="4" fill="#333"/>
    <text x="640" y="218" font-size="13" fill="#444">rigid mount</text>

    <!-- callout: half-cylinder trough -->
    <g font-size="13" fill="#444">
      <line x1="430" y1="350" x2="380" y2="290" stroke="#666" stroke-width="1"/>
      <text x="240" y="355">elongated half&#8209;cylinder trough (open top)</text>
    </g>
  </g>

  <!-- ==================================================
       Row 3: Mechanism of action
       ================================================== -->
  <g id="mechanism" transform="translate(0,830)">
    <text x="600" y="0" text-anchor="middle" font-size="24" font-weight="700">
      Mechanism of action
    </text>
    <text x="600" y="26" text-anchor="middle" font-size="14" fill="#555" font-style="italic">
      pure mechanical: no actuated bucket — the gantry motion + a fixed ledge do all the work
    </text>

    <!-- ============== Step 1: Dip down ============== -->
    <g id="step1" transform="translate(60,80)">
      <text x="160" y="0" text-anchor="middle" font-size="18" font-weight="600">1. Dip down into powder</text>

      <!-- powder bed -->
      <rect x="0" y="200" width="320" height="70" fill="url(#powder)" stroke="#7a5a1a" stroke-width="1"/>
      <text x="160" y="290" text-anchor="middle" font-size="13" fill="#7a5a1a">powder bed</text>

      <!-- arm -->
      <rect x="150" y="20" width="20" height="200" fill="url(#metal)" stroke="#333"/>

      <!-- bucket dipped into powder (front view, semicircle) -->
      <line x1="80" y1="220" x2="240" y2="220" stroke="#222" stroke-width="2"/>
      <path d="M80,220 A80,80 0 0 0 240,220"
            fill="url(#metal)" stroke="#222" stroke-width="2"/>
      <!-- powder filling inside bucket -->
      <path d="M86,220 A74,74 0 0 0 234,220 Z" fill="url(#powder)" opacity="0.95"/>

      <!-- downward motion arrow -->
      <line x1="40" y1="40" x2="40" y2="180" stroke="#1f5fbf" stroke-width="3"
            marker-end="url(#arrowBlue)"/>
      <text x="20" y="120" font-size="13" fill="#1f5fbf" transform="rotate(-90,20,120)" text-anchor="middle">
        Z↓
      </text>
    </g>

    <!-- arrow between step 1 and 2 -->
    <line x1="400" y1="220" x2="450" y2="220" stroke="#222" stroke-width="2.5"
          marker-end="url(#arrow)"/>

    <!-- ============== Step 2: Lift &amp; transport ============== -->
    <g id="step2" transform="translate(470,80)">
      <text x="160" y="0" text-anchor="middle" font-size="18" font-weight="600">2. Lift &amp; transport</text>

      <!-- powder bed (low, behind) -->
      <rect x="0" y="240" width="320" height="30" fill="url(#powder)" stroke="#7a5a1a" stroke-width="1"/>

      <!-- arm (raised) -->
      <rect x="150" y="20" width="20" height="100" fill="url(#metal)" stroke="#333"/>

      <!-- bucket raised, powder retained -->
      <line x1="80" y1="120" x2="240" y2="120" stroke="#222" stroke-width="2"/>
      <path d="M80,120 A80,80 0 0 0 240,120"
            fill="url(#metal)" stroke="#222" stroke-width="2"/>
      <!-- retained powder -->
      <path d="M86,120 A74,74 0 0 0 234,120 Z" fill="url(#powder)" opacity="0.95"/>

      <!-- upward motion arrow -->
      <line x1="40" y1="180" x2="40" y2="40" stroke="#1f5fbf" stroke-width="3"
            marker-end="url(#arrowBlue)"/>
      <text x="20" y="120" font-size="13" fill="#1f5fbf" transform="rotate(-90,20,120)" text-anchor="middle">
        Z↑
      </text>

      <!-- horizontal travel arrow -->
      <line x1="270" y1="160" x2="320" y2="160" stroke="#1f5fbf" stroke-width="3"
            marker-end="url(#arrowBlue)"/>
      <text x="295" y="180" text-anchor="middle" font-size="13" fill="#1f5fbf">X →</text>
    </g>

    <!-- arrow between step 2 and 3 -->
    <line x1="820" y1="220" x2="870" y2="220" stroke="#222" stroke-width="2.5"
          marker-end="url(#arrow)"/>

    <!-- ============== Step 3: Push against ledge → deposit ============== -->
    <g id="step3" transform="translate(880,80)">
      <text x="140" y="0" text-anchor="middle" font-size="18" font-weight="600">3. Tip against ledge → deposit</text>

      <!-- arm tilted by being pushed against ledge -->
      <g transform="translate(140,30) rotate(-35)">
        <!-- arm -->
        <rect x="-10" y="0" width="20" height="140" fill="url(#metal)" stroke="#333"/>
        <!-- bucket -->
        <line x1="-80" y1="140" x2="80" y2="140" stroke="#222" stroke-width="2"/>
        <path d="M-80,140 A80,80 0 0 0 80,140"
              fill="url(#metal)" stroke="#222" stroke-width="2"/>
      </g>

      <!-- falling powder stream -->
      <g fill="url(#powder)" opacity="0.95">
        <path d="M150,170 Q170,210 180,260 L210,260 Q220,210 200,170 Z"/>
      </g>
      <!-- a few stray grains -->
      <g fill="#b89a55">
        <circle cx="160" cy="200" r="1.5"/>
        <circle cx="195" cy="225" r="1.5"/>
        <circle cx="175" cy="245" r="1.5"/>
      </g>

      <!-- ledge with sawtooth top edge -->
      <g>
        <rect x="120" y="260" width="180" height="30" fill="#8a7a5e" stroke="#444" stroke-width="1"/>
        <polygon points="120,260 132,240 144,260 156,240 168,260 180,240 192,260 204,240 216,260 228,240 240,260 252,240 264,260 276,240 288,260 300,240 300,260"
                 fill="#8a7a5e" stroke="#444" stroke-width="1"/>
        <text x="210" y="308" text-anchor="middle" font-size="13" fill="#5a4a30">
          fixed ledge (sawtooth catches bucket lip)
        </text>
      </g>

      <!-- rotation arrow -->
      <path d="M60,80 A60,60 0 0 1 130,40" fill="none" stroke="#1f5fbf" stroke-width="3"
            marker-end="url(#arrowBlue)"/>
      <text x="40" y="55" font-size="13" fill="#1f5fbf">tilt</text>

      <!-- deposit arrow into pile -->
      <text x="180" y="200" font-size="13" fill="#7a5a1a">powder pours out</text>
    </g>
  </g>

  <!-- ==================================================
       Footer caption
       ================================================== -->
  <text x="600" y="1480" text-anchor="middle" font-size="13" fill="#666" font-style="italic">
    Clean recreation of powder-excavator-sketch.jpg — see README for design notes &amp; brainstorming.
  </text>
</svg>
