<text x="380" y="28" text-anchor="middle" font-size="15" font-weight="600">Pin-defined-path actuation (cam-slot variant)</text><text x="380" y="46" text-anchor="middle" font-size="11" fill="#555" font-style="italic">peg on top of stem rides in routed slot in a fixed external board; slot path = tilt schedule</text><rect x="60" y="100" width="640" height="56" fill="#e8e2cc" stroke="#7a6f4a" stroke-width="2" rx="3"/><text x="68" y="94" font-size="10" fill="#555">fixed external slot board (mounted to lab frame)</text><polyline points="90,128.0 260,128.0 430,128.0 520,122.0 600,114 680,114" fill="none" stroke="#3a342a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/><polyline points="90,128.0 260,128.0 430,128.0 520,122.0 600,114 680,114" fill="none" stroke="#857a5a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><rect x="118" y="240" width="44" height="20" fill="#cfd8dc" stroke="#37474f" stroke-width="1.5" rx="2"/><text x="140" y="236" text-anchor="middle" font-size="10" fill="#37474f">carriage</text><circle cx="140" cy="250" r="3" fill="#222"/><g transform="translate(140,250) rotate(0.0)">  <line x1="0" y1="0" x2="0" y2="-122.0" stroke="#444" stroke-width="3"/>  <rect x="-9" y="-126.0" width="18" height="8" fill="#9aa0a6" stroke="#222" stroke-width="1.2" rx="1"/>  <line x1="0" y1="0" x2="0" y2="130" stroke="#444" stroke-width="3"/>  <g transform="translate(0,130) rotate(0.0)">
  <path d="M -22 0 L 22 0 A 22 22 0 0 1 -22 0 Z" fill="url(#metal)" stroke="#222" stroke-width="2"/>
  <path d="M -21.669999999999998 6.600000000000001 L 21.669999999999998 6.600000000000001 A 21.669999999999998 21.669999999999998 0 0 1 -21.669999999999998 6.600000000000001 Z" fill="url(#powder)" opacity="0.95"/>
</g></g><text x="140" y="450" text-anchor="middle" font-size="12" font-weight="600">Scoop</text><text x="140" y="466" text-anchor="middle" font-size="10" fill="#555">trough flat, peg in flat section of slot</text><rect x="358" y="240" width="44" height="20" fill="#cfd8dc" stroke="#37474f" stroke-width="1.5" rx="2"/><text x="380" y="236" text-anchor="middle" font-size="10" fill="#37474f">carriage</text><circle cx="380" cy="250" r="3" fill="#222"/><g transform="translate(380,250) rotate(0.0)">  <line x1="0" y1="0" x2="0" y2="-122.0" stroke="#444" stroke-width="3"/>  <rect x="-9" y="-126.0" width="18" height="8" fill="#9aa0a6" stroke="#222" stroke-width="1.2" rx="1"/>  <line x1="0" y1="0" x2="0" y2="130" stroke="#444" stroke-width="3"/>  <g transform="translate(0,130) rotate(0.0)">
  <path d="M -22 0 L 22 0 A 22 22 0 0 1 -22 0 Z" fill="url(#metal)" stroke="#222" stroke-width="2"/>
  <path d="M -21.669999999999998 6.600000000000001 L 21.669999999999998 6.600000000000001 A 21.669999999999998 21.669999999999998 0 0 1 -21.669999999999998 6.600000000000001 Z" fill="url(#powder)" opacity="0.95"/>
</g></g><text x="380" y="450" text-anchor="middle" font-size="12" font-weight="600">Transport</text><text x="380" y="466" text-anchor="middle" font-size="10" fill="#555">trough still flat (slot still flat)</text><rect x="618" y="240" width="44" height="20" fill="#cfd8dc" stroke="#37474f" stroke-width="1.5" rx="2"/><text x="640" y="236" text-anchor="middle" font-size="10" fill="#37474f">carriage</text><circle cx="640" cy="250" r="3" fill="#222"/><g transform="translate(640,250) rotate(0.0)">  <line x1="0" y1="0" x2="0" y2="-122.0" stroke="#444" stroke-width="3"/>  <rect x="-9" y="-126.0" width="18" height="8" fill="#9aa0a6" stroke="#222" stroke-width="1.2" rx="1"/>  <line x1="0" y1="0" x2="0" y2="130" stroke="#444" stroke-width="3"/>  <g transform="translate(0,130) rotate(25.0)">
  <path d="M -22 0 L 22 0 A 22 22 0 0 1 -22 0 Z" fill="url(#metal)" stroke="#222" stroke-width="2"/>
  <path d="M -21.669999999999998 16.5 L 21.669999999999998 16.5 A 21.669999999999998 21.669999999999998 0 0 1 -21.669999999999998 16.5 Z" fill="url(#powder)" opacity="0.95"/>
</g></g><text x="640" y="450" text-anchor="middle" font-size="12" font-weight="600">Pour</text><text x="640" y="466" text-anchor="middle" font-size="10" fill="#555">slot rises -> stem tilts -> trough rolls sideways</text><text x="170" y="180" text-anchor="middle" font-size="10" fill="#3a342a">flat slot section -> trough level</text><text x="555" y="86" text-anchor="middle" font-size="10" fill="#3a342a">rising slot section -> stem leans -> trough tilts</text><rect x="100" y="408" width="80" height="34" fill="url(#powder)" stroke="#7a6a3a" stroke-width="1.2"/><text x="140" y="458" text-anchor="middle" font-size="10" fill="#7a6a3a">stock powder bed</text><rect x="600" y="418" width="80" height="6" fill="#cfd8dc" stroke="#37474f" stroke-width="1"/><text x="640" y="458" text-anchor="middle" font-size="10" fill="#555">deposit / target plate</text><text x="380" y="500" text-anchor="middle" font-size="10" fill="#555" font-style="italic">See manuscript Sec. "Pin-defined-path actuation" for the trade-off vs. the smooth cam ramp.</text></svg>
