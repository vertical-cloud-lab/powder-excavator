<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <linearGradient id="metalH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <pattern id="powder" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#e8d9a8"/>
      <circle cx="1.5" cy="1.5" r="0.6" fill="#b89a55"/>
      <circle cx="4"   cy="3.5" r="0.6" fill="#b89a55"/>
      <circle cx="2"   cy="5"   r="0.5" fill="#b89a55"/>
    </pattern>
    <marker id="arrowK" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5fbf"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
<text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700">Subpanel C — 3D / isometric view of the assembly on a gantry</text><text x="500" y="56" text-anchor="middle" font-size="13" fill="#555" font-style="italic">two arms grip the two end caps via pin stubs (red dots); cam track on a fixed post drives the sideways tilt</text><rect x="180" y="80" width="640" height="22" fill="url(#metalH)" stroke="#222" stroke-width="1.5"/><text x="500" y="76" text-anchor="middle" font-size="12" fill="#444">gantry carriage (carries the two arms; X / Z stage)</text><polygon points="250,102 268,102 268,308 250,308" fill="url(#metal)" stroke="#333"/><polygon points="690,102 708,102 718,298 700,298" fill="url(#metal)" stroke="#333"/><text x="246" y="98" text-anchor="end" font-size="11" fill="#444">arm L</text><text x="722" y="98" text-anchor="start" font-size="11" fill="#444">arm R</text><polygon points="280,300 686,290 686,260 280,270" fill="#dfe4ea" stroke="#222" stroke-width="2"/><path d="M 280,270 C 350,420 616,410 686,260 L 686,290 C 616,440 350,450 280,300 Z" fill="url(#metalH)" stroke="#222" stroke-width="2"/><polygon points="286,295 680,287 680,265 286,275" fill="url(#powder)" opacity="0.95"/><line x1="268" y1="285" x2="280" y2="284" stroke="#c0392b" stroke-width="5"/><line x1="280" y1="284" x2="686" y2="276" stroke="#c0392b" stroke-width="3" stroke-dasharray="7 4" opacity="0.65"/><line x1="686" y1="276" x2="702" y2="275" stroke="#c0392b" stroke-width="5"/><circle cx="259" cy="286" r="6" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/><circle cx="709" cy="274" r="6" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/><line x1="259" y1="297" x2="220" y2="345" stroke="#c0392b" stroke-width="1"/><text x="214" y="357" text-anchor="end" font-size="11" fill="#c0392b">pin stub through end cap → bushing on arm L</text><line x1="709" y1="287" x2="750" y2="335" stroke="#c0392b" stroke-width="1"/><text x="754" y="347" text-anchor="start" font-size="11" fill="#c0392b">pin stub through end cap → bushing on arm R</text><text x="483" y="248" text-anchor="middle" font-size="11" fill="#c0392b" font-style="italic">(dashed segment = pin hidden inside trough body)</text><polygon points="310,272 330,266 330,258 310,264" fill="#7e8794" stroke="#222" stroke-width="1.2"/><polygon points="636,266 656,260 656,252 636,258" fill="#7e8794" stroke="#222" stroke-width="1.2"/><text x="483" y="232" text-anchor="middle" font-size="11" fill="#444">chamfered bumpers (rim of long side) — slide up the cam track</text><rect x="850" y="180" width="18" height="320" fill="#8a7a5e" stroke="#444"/><text x="858" y="510" text-anchor="middle" font-size="11" fill="#5a4a30">fixed post</text><polygon points="730,300 850,300 850,250 730,300" fill="#8a7a5e" stroke="#444" stroke-width="1.5"/><text x="780" y="320" text-anchor="middle" font-size="12" fill="#5a4a30">smooth inclined cam track</text><text x="780" y="336" text-anchor="middle" font-size="11" fill="#7a6a4a">(replaces sawtooth; bumper slides up its hypotenuse)</text><rect x="220" y="510" width="350" height="10" fill="#5a4a30" stroke="#222"/><text x="395" y="535" text-anchor="middle" font-size="11" fill="#5a4a30">fixed strike-off bar (bed-edge mounted; trough wipes under during the lift-out)</text><rect x="180" y="555" width="430" height="55" fill="url(#powder)" stroke="#7a5a1a"/><text x="395" y="595" text-anchor="middle" font-size="12" fill="#7a5a1a">powder bed</text><g transform="translate(880,590)"><rect x="-6" y="-46" width="100" height="64" fill="#fff" stroke="#aaa" stroke-width="1" rx="3"/><line x1="0" y1="0" x2="40" y2="0" stroke="#222" stroke-width="2" marker-end="url(#arrowK)"/><text x="44" y="4" font-size="10" fill="#222">L (pin axis)</text><line x1="0" y1="0" x2="0" y2="-30" stroke="#1f5fbf" stroke-width="2" marker-end="url(#arrowB)"/><text x="4" y="-32" font-size="10" fill="#1f5fbf">Z gantry</text><circle cx="0" cy="0" r="3" fill="#c0392b"/><circle cx="0" cy="0" r="6" fill="none" stroke="#c0392b"/><text x="-10" y="14" font-size="10" fill="#c0392b" text-anchor="end">X (out of page)</text></g></svg>
