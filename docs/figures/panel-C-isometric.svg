<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <linearGradient id="metalH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <pattern id="powder" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#e8d9a8"/>
      <circle cx="1.5" cy="1.5" r="0.6" fill="#b89a55"/>
      <circle cx="4"   cy="3.5" r="0.6" fill="#b89a55"/>
      <circle cx="2"   cy="5"   r="0.5" fill="#b89a55"/>
    </pattern>
    <marker id="arrowK" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5fbf"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
<text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700">Subpanel C — 3D / isometric view of the assembly on a gantry</text><text x="500" y="56" text-anchor="middle" font-size="13" fill="#555" font-style="italic">two arms grip the two end caps; longitudinal pin (red) along L; cam track on a fixed post for sideways tilt</text><rect x="180" y="80" width="640" height="22" fill="url(#metalH)" stroke="#222" stroke-width="1.5"/><text x="500" y="76" text-anchor="middle" font-size="12" fill="#444">gantry carriage (X / Z stage)</text><polygon points="270,102 290,102 290,300 270,300" fill="url(#metal)" stroke="#333"/><polygon points="640,102 660,102 670,290 650,290" fill="url(#metal)" stroke="#333"/><polygon points="290,300 660,290 660,260 290,270" fill="#dfe4ea" stroke="#222" stroke-width="2"/><path d="M 290,270 C 360,420 590,410 660,260 L 660,290 C 590,440 360,450 290,300 Z" fill="url(#metalH)" stroke="#222" stroke-width="2"/><polygon points="296,295 654,287 654,265 296,275" fill="url(#powder)" opacity="0.95"/><line x1="266" y1="285" x2="676" y2="275" stroke="#c0392b" stroke-width="4"/><circle cx="266" cy="285" r="6" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/><circle cx="676" cy="275" r="6" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/><text x="200" y="298" font-size="12" fill="#c0392b">pivot pin (along L)</text><polygon points="320,272 340,266 340,258 320,264" fill="#7e8794" stroke="#222" stroke-width="1.2"/><polygon points="610,266 630,260 630,252 610,258" fill="#7e8794" stroke="#222" stroke-width="1.2"/><text x="475" y="248" text-anchor="middle" font-size="11" fill="#444">chamfered bumpers (rim of long side) — slide up the cam track</text><rect x="850" y="180" width="18" height="320" fill="#8a7a5e" stroke="#444"/><text x="858" y="510" text-anchor="middle" font-size="11" fill="#5a4a30">fixed post</text><polygon points="730,300 850,300 850,250 730,300" fill="#8a7a5e" stroke="#444" stroke-width="1.5"/><text x="780" y="320" text-anchor="middle" font-size="12" fill="#5a4a30">smooth inclined cam track</text><text x="780" y="336" text-anchor="middle" font-size="11" fill="#7a6a4a">(replaces sawtooth; bumper slides up its hypotenuse)</text><rect x="220" y="510" width="350" height="10" fill="#5a4a30" stroke="#222"/><text x="395" y="535" text-anchor="middle" font-size="11" fill="#5a4a30">fixed strike-off bar (bed-edge mounted; trough wipes under during the lift-out)</text><rect x="180" y="555" width="430" height="55" fill="url(#powder)" stroke="#7a5a1a"/><text x="395" y="595" text-anchor="middle" font-size="12" fill="#7a5a1a">powder bed</text></svg>
