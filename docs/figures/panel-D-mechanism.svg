<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620"
     font-family="Helvetica, Arial, sans-serif">
  <!--
    Subpanel D — Mechanism of action (3 steps).

    KEY CORRECTIONS vs. previous version:
      * The two vertical arms (and the carriage above them) ALWAYS stay
        vertical. Only the trough rotates, and only about the pivot pin.
      * The sawtooth ledge is wall-/post-mounted at trough-lip height,
        NOT a sawtooth on the floor of the powder bed.
      * The hooked lip on the trough's upper long edge is what catches
        a sawtooth tooth when the gantry pushes the trough sideways.
  -->
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <pattern id="powder" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#e8d9a8"/>
      <circle cx="1.5" cy="1.5" r="0.6" fill="#b89a55"/>
      <circle cx="4" cy="3.5" r="0.6" fill="#b89a55"/>
      <circle cx="2" cy="5"   r="0.5" fill="#b89a55"/>
    </pattern>
    <marker id="arrowK" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5fbf"/>
    </marker>
  </defs>

  <text x="600" y="34" text-anchor="middle" font-size="22" font-weight="700">
    Subpanel D — Mechanism of action
  </text>
  <text x="600" y="56" text-anchor="middle" font-size="13" fill="#555" font-style="italic">
    arms remain vertical at all times; only the trough rotates about the pivot pin
  </text>

  <!-- ============================================================
       STEP 1 — DIP DOWN INTO POWDER
       Trough is open-up (gravity); arms vertical; bucket plunged into bed.
       ============================================================ -->
  <g id="step1" transform="translate(40,90)">
    <text x="170" y="0" text-anchor="middle" font-size="17" font-weight="600">
      1. Dip down into powder
    </text>

    <!-- powder bed -->
    <rect x="0" y="290" width="340" height="80" fill="url(#powder)" stroke="#7a5a1a" stroke-width="1"/>
    <text x="170" y="395" text-anchor="middle" font-size="12" fill="#7a5a1a">powder bed</text>

    <!-- two vertical arms (always vertical) -->
    <rect x="100" y="40" width="14" height="240" fill="url(#metal)" stroke="#333"/>
    <rect x="226" y="40" width="14" height="240" fill="url(#metal)" stroke="#333"/>

    <!-- pivot pin -->
    <line x1="100" y1="280" x2="240" y2="280" stroke="#c0392b" stroke-width="4"/>
    <circle cx="100" cy="280" r="4" fill="#7a1f15"/>
    <circle cx="240" cy="280" r="4" fill="#7a1f15"/>

    <!-- trough hanging open-up, dipped into powder -->
    <line x1="60" y1="280" x2="280" y2="280" stroke="#222" stroke-width="2"/>
    <path d="M60,280 A110,110 0 0 0 280,280"
          fill="url(#metal)" stroke="#222" stroke-width="2"/>
    <path d="M67,280 A103,103 0 0 0 273,280 Z" fill="url(#powder)" opacity="0.95"/>

    <!-- pivot bosses -->
    <circle cx="60"  cy="280" r="6" fill="#aab2bd" stroke="#333"/>
    <circle cx="280" cy="280" r="6" fill="#aab2bd" stroke="#333"/>

    <!-- hooked lip -->
    <path d="M60,280 q-7,-5 -7,-13 q0,-3 4,-3" fill="none" stroke="#222" stroke-width="2"/>
    <path d="M280,280 q7,-5 7,-13 q0,-3 -4,-3" fill="none" stroke="#222" stroke-width="2"/>

    <!-- Z↓ arrow -->
    <line x1="20" y1="60" x2="20" y2="240" stroke="#1f5fbf" stroke-width="3"
          marker-end="url(#arrowB)"/>
    <text x="6" y="155" font-size="13" fill="#1f5fbf" transform="rotate(-90,6,155)" text-anchor="middle">
      Z ↓
    </text>
  </g>

  <!-- arrow between step 1 and step 2 -->
  <line x1="400" y1="240" x2="450" y2="240" stroke="#222" stroke-width="2.5"
        marker-end="url(#arrowK)"/>

  <!-- ============================================================
       STEP 2 — LIFT & TRANSPORT
       ============================================================ -->
  <g id="step2" transform="translate(470,90)">
    <text x="170" y="0" text-anchor="middle" font-size="17" font-weight="600">
      2. Lift &amp; transport
    </text>

    <!-- low / distant powder bed -->
    <rect x="0" y="350" width="340" height="20" fill="url(#powder)" stroke="#7a5a1a" stroke-width="1"/>

    <!-- two vertical arms (raised) -->
    <rect x="100" y="40" width="14" height="140" fill="url(#metal)" stroke="#333"/>
    <rect x="226" y="40" width="14" height="140" fill="url(#metal)" stroke="#333"/>

    <!-- pivot pin -->
    <line x1="100" y1="180" x2="240" y2="180" stroke="#c0392b" stroke-width="4"/>
    <circle cx="100" cy="180" r="4" fill="#7a1f15"/>
    <circle cx="240" cy="180" r="4" fill="#7a1f15"/>

    <!-- trough still open-up, full of powder -->
    <line x1="60" y1="180" x2="280" y2="180" stroke="#222" stroke-width="2"/>
    <path d="M60,180 A110,110 0 0 0 280,180"
          fill="url(#metal)" stroke="#222" stroke-width="2"/>
    <path d="M67,180 A103,103 0 0 0 273,180 Z" fill="url(#powder)" opacity="0.95"/>

    <!-- pivot bosses -->
    <circle cx="60"  cy="180" r="6" fill="#aab2bd" stroke="#333"/>
    <circle cx="280" cy="180" r="6" fill="#aab2bd" stroke="#333"/>

    <!-- hooked lip -->
    <path d="M60,180 q-7,-5 -7,-13 q0,-3 4,-3" fill="none" stroke="#222" stroke-width="2"/>
    <path d="M280,180 q7,-5 7,-13 q0,-3 -4,-3" fill="none" stroke="#222" stroke-width="2"/>

    <!-- Z↑ -->
    <line x1="20" y1="240" x2="20" y2="60" stroke="#1f5fbf" stroke-width="3"
          marker-end="url(#arrowB)"/>
    <text x="6" y="155" font-size="13" fill="#1f5fbf" transform="rotate(-90,6,155)" text-anchor="middle">
      Z ↑
    </text>

    <!-- X→ -->
    <line x1="300" y1="220" x2="350" y2="220" stroke="#1f5fbf" stroke-width="3"
          marker-end="url(#arrowB)"/>
    <text x="325" y="240" text-anchor="middle" font-size="13" fill="#1f5fbf">X →</text>
  </g>

  <!-- arrow between step 2 and step 3 -->
  <line x1="820" y1="240" x2="870" y2="240" stroke="#222" stroke-width="2.5"
        marker-end="url(#arrowK)"/>

  <!-- ============================================================
       STEP 3 — TIP AGAINST WALL-MOUNTED LEDGE → DEPOSIT
       Arms still vertical. Trough has rotated about the pin. The
       sawtooth ledge is mounted to a fixed post/wall at lip height,
       not lying on the floor.
       ============================================================ -->
  <g id="step3" transform="translate(880,90)">
    <text x="160" y="0" text-anchor="middle" font-size="17" font-weight="600">
      3. Tip against ledge → deposit
    </text>

    <!-- Two arms — STILL VERTICAL -->
    <rect x="100" y="40" width="14" height="140" fill="url(#metal)" stroke="#333"/>
    <rect x="226" y="40" width="14" height="140" fill="url(#metal)" stroke="#333"/>

    <!-- pivot pin (still horizontal, same height) -->
    <line x1="100" y1="180" x2="240" y2="180" stroke="#c0392b" stroke-width="4"/>
    <circle cx="100" cy="180" r="4" fill="#7a1f15"/>
    <circle cx="240" cy="180" r="4" fill="#7a1f15"/>

    <!-- ROTATED trough (rotates about pivot at (170,180) by -55deg) -->
    <g transform="rotate(-55 170 180)">
      <!-- trough top rim line -->
      <line x1="60" y1="180" x2="280" y2="180" stroke="#222" stroke-width="2"/>
      <!-- half-cyl -->
      <path d="M60,180 A110,110 0 0 0 280,180"
            fill="url(#metal)" stroke="#222" stroke-width="2"/>
      <!-- pivot bosses -->
      <circle cx="60"  cy="180" r="6" fill="#aab2bd" stroke="#333"/>
      <circle cx="280" cy="180" r="6" fill="#aab2bd" stroke="#333"/>
      <!-- hooked lips -->
      <path d="M60,180 q-7,-5 -7,-13 q0,-3 4,-3" fill="none" stroke="#222" stroke-width="2"/>
      <path d="M280,180 q7,-5 7,-13 q0,-3 -4,-3" fill="none" stroke="#222" stroke-width="2"/>
    </g>

    <!-- wall-mounted sawtooth LEDGE: a horizontal beam at lip height,
         with a sawtooth top edge facing UP. Mounted to a fixed
         post on the right side. -->
    <!-- post -->
    <rect x="320" y="120" width="14" height="320" fill="#8a7a5e" stroke="#444"/>
    <text x="340" y="430" font-size="11" fill="#5a4a30">fixed post</text>
    <!-- horizontal ledge bar -->
    <rect x="200" y="190" width="120" height="18" fill="#8a7a5e" stroke="#444"/>
    <!-- sawtooth top edge of the ledge bar -->
    <polygon points="200,190 208,176 216,190 224,176 232,190 240,176 248,190 256,176 264,190 272,176 280,190 288,176 296,190 304,176 312,190 320,176 320,190"
             fill="#8a7a5e" stroke="#444"/>
    <text x="240" y="232" font-size="12" fill="#5a4a30">wall-mounted sawtooth ledge</text>
    <text x="240" y="248" font-size="11" fill="#7a6a4a">(at trough-lip height — NOT on the floor)</text>

    <!-- where the lip catches a tooth -->
    <circle cx="232" cy="178" r="6" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="155" y="105" font-size="11" fill="#c0392b">hooked lip catches</text>
    <text x="170" y="120" font-size="11" fill="#c0392b">a sawtooth tooth →</text>

    <!-- powder pours out (downward stream) -->
    <g fill="url(#powder)" opacity="0.95">
      <path d="M70,270 Q80,310 90,360 L130,360 Q140,310 110,270 Z"/>
    </g>
    <g fill="#b89a55">
      <circle cx="80"  cy="300" r="1.5"/>
      <circle cx="120" cy="320" r="1.5"/>
      <circle cx="100" cy="345" r="1.5"/>
    </g>
    <text x="100" y="400" text-anchor="middle" font-size="11" fill="#7a5a1a">powder pours out</text>

    <!-- horizontal X-push arrow on the carriage region -->
    <line x1="40" y1="100" x2="100" y2="100" stroke="#1f5fbf" stroke-width="3"
          marker-end="url(#arrowB)"/>
    <text x="70" y="92" text-anchor="middle" font-size="12" fill="#1f5fbf">gantry pushes X →</text>

    <!-- rotation indicator on trough -->
    <path d="M195,225 a32,32 0 0 1 28,-44" fill="none" stroke="#1f5fbf"
          stroke-width="2.5" marker-end="url(#arrowB)"/>
    <text x="160" y="260" font-size="12" fill="#1f5fbf">trough rotates about pin</text>
  </g>

  <!-- caption -->
  <text x="600" y="540" text-anchor="middle" font-size="13" fill="#444" font-style="italic">
    Across all three steps the two arms (and therefore the pivot pin's height) remain unchanged.
    The trough is the only part that ever rotates,
  </text>
  <text x="600" y="560" text-anchor="middle" font-size="13" fill="#444" font-style="italic">
    and only when its hooked lip is forced against the wall-mounted sawtooth ledge during X
    travel. No actuator on the bucket itself.
  </text>
  <text x="600" y="585" text-anchor="middle" font-size="12" fill="#888">
    Choosing the X-coordinate at which the lip first engages the sawtooth selects the deposit
    location; multiple teeth give discrete, repeatable engagement points.
  </text>
</svg>
