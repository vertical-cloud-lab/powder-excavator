<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 640"
     font-family="Helvetica, Arial, sans-serif">
  <!--
    Subpanel D — Mechanism of action (3 steps), drawn from the SIDE
    (looking along the pivot pin axis).

    KEY POINTS (corrected per review):
      * Two vertical arms project to the same single arm in this view
        (they're in line because we're looking along the pin axis).
      * Pivot pin is end-on (red dot) at the trough's midpoint along L.
      * The trough rotates END-OVER-END about that pin (like a
        ferris-wheel gondola pushed past horizontal).
      * Sawtooth ledge is wall-/post-mounted at trough-end-lip height
        (NOT on the powder-bed floor).
      * Arms always stay vertical; only the trough rotates.
  -->
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <pattern id="powder" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#e8d9a8"/>
      <circle cx="1.5" cy="1.5" r="0.6" fill="#b89a55"/>
      <circle cx="4" cy="3.5" r="0.6" fill="#b89a55"/>
      <circle cx="2" cy="5"   r="0.5" fill="#b89a55"/>
    </pattern>
    <marker id="arrowK" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5fbf"/>
    </marker>
  </defs>

  <text x="650" y="34" text-anchor="middle" font-size="22" font-weight="700">
    Subpanel D — Mechanism of action (side view, looking along pivot axis)
  </text>
  <text x="650" y="56" text-anchor="middle" font-size="13" fill="#555" font-style="italic">
    arms always vertical; only the trough rotates (end-over-end about the transverse pin)
  </text>

  <!-- ============== STEP 1 — DIP DOWN ============== -->
  <g id="step1" transform="translate(40,90)">
    <text x="200" y="0" text-anchor="middle" font-size="17" font-weight="600">
      1. Dip down into powder
    </text>

    <!-- powder bed -->
    <rect x="0" y="320" width="400" height="100" fill="url(#powder)" stroke="#7a5a1a"/>
    <text x="200" y="445" text-anchor="middle" font-size="12" fill="#7a5a1a">powder bed</text>

    <!-- Single arm (the two arms project to the same line in this view) -->
    <rect x="190" y="40" width="20" height="240" fill="url(#metal)" stroke="#333"/>
    <text x="220" y="55" font-size="11" fill="#444">two arms (in-line)</text>

    <!-- Pivot pin end-on at the bottom of the arm -->
    <circle cx="200" cy="280" r="8" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/>

    <!-- Trough — long profile, level (open up), centred on the pivot pin,
         dipped into the powder bed.
         Trough sits BELOW the pivot pin; the pin is at the top of the
         long side wall. -->
    <g transform="translate(0,0)">
      <!-- top rim -->
      <line x1="40" y1="280" x2="360" y2="280" stroke="#222" stroke-width="2"/>
      <!-- body: shallow rectangle with curved bottom -->
      <path d="M40,280 L360,280 L360,300 Q200,400 40,300 Z"
            fill="url(#metal)" stroke="#222" stroke-width="2"/>
      <!-- powder filling -->
      <path d="M48,280 L352,280 L352,300 Q200,392 48,300 Z" fill="url(#powder)" opacity="0.95"/>
      <!-- hooked end lips -->
      <path d="M40,280 q-6,-5 -6,-12 q0,-3 4,-3" fill="none" stroke="#222" stroke-width="2"/>
      <path d="M360,280 q6,-5 6,-12 q0,-3 -4,-3" fill="none" stroke="#222" stroke-width="2"/>
    </g>

    <!-- Z↓ arrow -->
    <line x1="20" y1="60" x2="20" y2="220" stroke="#1f5fbf" stroke-width="3"
          marker-end="url(#arrowB)"/>
    <text x="6" y="140" font-size="13" fill="#1f5fbf"
          transform="rotate(-90,6,140)" text-anchor="middle">Z ↓</text>
  </g>

  <line x1="450" y1="270" x2="500" y2="270" stroke="#222" stroke-width="2.5"
        marker-end="url(#arrowK)"/>

  <!-- ============== STEP 2 — LIFT & TRANSPORT ============== -->
  <g id="step2" transform="translate(520,90)">
    <text x="200" y="0" text-anchor="middle" font-size="17" font-weight="600">
      2. Lift &amp; transport
    </text>

    <!-- distant powder bed -->
    <rect x="0" y="430" width="400" height="20" fill="url(#powder)" stroke="#7a5a1a"/>

    <!-- Arm (raised) -->
    <rect x="190" y="40" width="20" height="140" fill="url(#metal)" stroke="#333"/>

    <!-- Pivot pin -->
    <circle cx="200" cy="180" r="8" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/>

    <!-- Trough — still level, full of powder, raised above the bed -->
    <g>
      <line x1="40" y1="180" x2="360" y2="180" stroke="#222" stroke-width="2"/>
      <path d="M40,180 L360,180 L360,200 Q200,300 40,200 Z"
            fill="url(#metal)" stroke="#222" stroke-width="2"/>
      <path d="M48,180 L352,180 L352,200 Q200,292 48,200 Z" fill="url(#powder)" opacity="0.95"/>
      <path d="M40,180 q-6,-5 -6,-12 q0,-3 4,-3" fill="none" stroke="#222" stroke-width="2"/>
      <path d="M360,180 q6,-5 6,-12 q0,-3 -4,-3" fill="none" stroke="#222" stroke-width="2"/>
    </g>

    <!-- Z↑ -->
    <line x1="20" y1="240" x2="20" y2="60" stroke="#1f5fbf" stroke-width="3"
          marker-end="url(#arrowB)"/>
    <text x="6" y="140" font-size="13" fill="#1f5fbf"
          transform="rotate(-90,6,140)" text-anchor="middle">Z ↑</text>

    <!-- X→ arrow -->
    <line x1="380" y1="320" x2="430" y2="320" stroke="#1f5fbf" stroke-width="3"
          marker-end="url(#arrowB)"/>
    <text x="405" y="340" text-anchor="middle" font-size="13" fill="#1f5fbf">X →</text>
  </g>

  <line x1="930" y1="270" x2="980" y2="270" stroke="#222" stroke-width="2.5"
        marker-end="url(#arrowK)"/>

  <!-- ============== STEP 3 — TIP END-OVER-END AGAINST LEDGE ============== -->
  <g id="step3" transform="translate(1000,90)">
    <text x="140" y="0" text-anchor="middle" font-size="17" font-weight="600">
      3. Tip end-over-end → deposit
    </text>

    <!-- Arm — STILL VERTICAL -->
    <rect x="100" y="40" width="20" height="140" fill="url(#metal)" stroke="#333"/>

    <!-- Pivot pin (still horizontal, same height) -->
    <circle cx="110" cy="180" r="8" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/>

    <!-- ROTATED trough: rotates about the pin (110,180) by -45 deg, so the
         RIGHT end drops down (into the dump zone) and the LEFT end rises. -->
    <g transform="rotate(-45 110 180)">
      <line x1="-50" y1="180" x2="270" y2="180" stroke="#222" stroke-width="2"/>
      <path d="M-50,180 L270,180 L270,200 Q110,300 -50,200 Z"
            fill="url(#metal)" stroke="#222" stroke-width="2"/>
      <!-- powder shifted toward the lower (right) end -->
      <path d="M120,182 L262,182 L262,200 Q200,272 120,232 Z"
            fill="url(#powder)" opacity="0.95"/>
      <path d="M-50,180 q-6,-5 -6,-12 q0,-3 4,-3" fill="none" stroke="#222" stroke-width="2"/>
      <path d="M270,180 q6,-5 6,-12 q0,-3 -4,-3" fill="none" stroke="#222" stroke-width="2"/>
    </g>

    <!-- Wall-mounted sawtooth LEDGE: a horizontal bar at trough-end-lip
         height, mounted on a fixed post on the right side.  -->
    <!-- post -->
    <rect x="320" y="120" width="14" height="320" fill="#8a7a5e" stroke="#444"/>
    <text x="340" y="430" font-size="11" fill="#5a4a30">fixed post</text>
    <!-- horizontal ledge bar -->
    <rect x="220" y="200" width="100" height="18" fill="#8a7a5e" stroke="#444"/>
    <!-- sawtooth top edge -->
    <polygon points="220,200 228,186 236,200 244,186 252,200 260,186 268,200 276,186 284,200 292,186 300,200 308,186 316,200 320,200"
             fill="#8a7a5e" stroke="#444"/>
    <text x="260" y="240" font-size="12" fill="#5a4a30">wall-mounted sawtooth ledge</text>
    <text x="260" y="256" font-size="11" fill="#7a6a4a">(at trough-END-lip height)</text>

    <!-- engagement marker — the trough's end-lip caught a tooth -->
    <circle cx="248" cy="188" r="7" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="100" y="115" font-size="11" fill="#c0392b">end-lip caught</text>
    <text x="120" y="130" font-size="11" fill="#c0392b">on a tooth →</text>

    <!-- powder pours out the LOWERED (right) end -->
    <g fill="url(#powder)" opacity="0.95">
      <path d="M210,330 Q220,380 230,440 L270,440 Q280,380 250,330 Z"/>
    </g>
    <g fill="#b89a55">
      <circle cx="220" cy="360" r="1.5"/>
      <circle cx="260" cy="395" r="1.5"/>
      <circle cx="240" cy="425" r="1.5"/>
    </g>
    <text x="240" y="475" text-anchor="middle" font-size="11" fill="#7a5a1a">powder pours out lowered end</text>

    <!-- gantry X-push -->
    <line x1="20" y1="100" x2="80" y2="100" stroke="#1f5fbf" stroke-width="3"
          marker-end="url(#arrowB)"/>
    <text x="50" y="92" text-anchor="middle" font-size="12" fill="#1f5fbf">gantry pushes X →</text>

    <!-- rotation indicator -->
    <path d="M70,210 a35,35 0 0 1 30,-46" fill="none" stroke="#1f5fbf"
          stroke-width="2.5" marker-end="url(#arrowB)"/>
    <text x="40" y="240" font-size="12" fill="#1f5fbf">trough tips end-over-end about pin</text>
  </g>

  <!-- caption -->
  <text x="650" y="555" text-anchor="middle" font-size="13" fill="#444" font-style="italic">
    Across all three steps the carriage / arms / pivot-pin height stay unchanged.  Only the
    trough rotates, and only when its hooked end-lip is forced
  </text>
  <text x="650" y="575" text-anchor="middle" font-size="13" fill="#444" font-style="italic">
    against the wall-mounted sawtooth ledge during X-travel.  Continued X-push tips the
    trough end-over-end about the transverse pin and powder slides
  </text>
  <text x="650" y="595" text-anchor="middle" font-size="13" fill="#444" font-style="italic">
    out the lowered end.  Backing the carriage off lets gravity right the trough (open up).
  </text>
  <text x="650" y="619" text-anchor="middle" font-size="12" fill="#888">
    Choosing which sawtooth tooth the lip engages selects the dump-tilt magnitude;
    a deeper-engaged tooth = larger tilt = more aggressive pour.
  </text>
</svg>
