<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 600" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <linearGradient id="metalH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <pattern id="powder" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#e8d9a8"/>
      <circle cx="1.5" cy="1.5" r="0.6" fill="#b89a55"/>
      <circle cx="4"   cy="3.5" r="0.6" fill="#b89a55"/>
      <circle cx="2"   cy="5"   r="0.5" fill="#b89a55"/>
    </pattern>
    <marker id="arrowK" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5fbf"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
<text x="880" y="34" text-anchor="middle" font-size="22" font-weight="700">Subpanel D — Mechanism of action (side view, 4 steps)</text><text x="880" y="56" text-anchor="middle" font-size="13" fill="#555" font-style="italic">arms always vertical; trough rolls SIDEWAYS about its longitudinal pin; smooth cam ramp (no sawtooth)</text><g transform="translate(20,80)"><text x="200" y="0" text-anchor="middle" font-size="17" font-weight="600">1. J-curve plunge</text>
<rect x="0" y="380" width="400" height="60" fill="url(#powder)" stroke="#7a5a1a"/>
<text x="200" y="430" text-anchor="middle" font-size="11" fill="#7a5a1a">powder bed</text>
<rect x="192" y="30" width="16" height="240" fill="url(#metal)" stroke="#333"/>
<circle cx="200" cy="290" r="7" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/>
<g transform="translate(200,290) rotate(0)">
  <path d="M -38 0 L 38 0 A 38 38 0 0 1 -38 0 Z" fill="url(#metal)" stroke="#222" stroke-width="2"/>
  <path d="M -37.43 0.0 L 37.43 0.0 A 37.43 37.43 0 0 1 -37.43 0.0 Z" fill="url(#powder)" opacity="0.95"/>
  <path d="M 38 0 L 44 -2 L 44 4 L 38 6 Z" fill="#7e8794" stroke="#222" stroke-width="1.2"/>
</g>
<path d="M 60 60 L 60 200 Q 60 260 130 280" fill="none" stroke="#1f5fbf" stroke-width="3" marker-end="url(#arrowB)"/><text x="48" y="120" font-size="11" fill="#1f5fbf" transform="rotate(-90 48 120)" text-anchor="middle">Z ↓</text><text x="100" y="294" font-size="11" fill="#1f5fbf">then X →</text><text x="36" y="22" font-size="10" fill="#1f5fbf">J-curve avoids flat-blunt compaction</text></g><line x1="430" y1="280" x2="465" y2="280" stroke="#222" stroke-width="2.5" marker-end="url(#arrowK)"/><g transform="translate(480,80)"><text x="200" y="0" text-anchor="middle" font-size="17" font-weight="600">2. Lift past strike-off bar</text>
<rect x="0" y="380" width="400" height="60" fill="url(#powder)" stroke="#7a5a1a"/>
<text x="200" y="430" text-anchor="middle" font-size="11" fill="#7a5a1a">powder bed</text>
<rect x="240" y="332" width="120" height="6" fill="#5a4a30" stroke="#222"/>
<text x="300" y="328" text-anchor="middle" font-size="10" fill="#5a4a30">strike-off bar</text>
<rect x="152" y="30" width="16" height="200" fill="url(#metal)" stroke="#333"/>
<circle cx="160" cy="250" r="7" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/>
<g transform="translate(160,250) rotate(0)">
  <path d="M -38 0 L 38 0 A 38 38 0 0 1 -38 0 Z" fill="url(#metal)" stroke="#222" stroke-width="2"/>
  <path d="M -37.43 0.0 L 37.43 0.0 A 37.43 37.43 0 0 1 -37.43 0.0 Z" fill="url(#powder)" opacity="0.95"/>
  <path d="M 38 0 L 44 -2 L 44 4 L 38 6 Z" fill="#7e8794" stroke="#222" stroke-width="1.2"/>
</g>
<line x1="40" y1="280" x2="40" y2="120" stroke="#1f5fbf" stroke-width="3" marker-end="url(#arrowB)"/><text x="26" y="200" font-size="11" fill="#1f5fbf" transform="rotate(-90 26 200)" text-anchor="middle">Z ↑</text><text x="290" y="290" font-size="10" fill="#5a4a30">trough wipes under bar →</text><text x="290" y="304" font-size="10" fill="#5a4a30">defines fill volume</text></g><line x1="890" y1="280" x2="925" y2="280" stroke="#222" stroke-width="2.5" marker-end="url(#arrowK)"/><g transform="translate(940,80)"><text x="200" y="0" text-anchor="middle" font-size="17" font-weight="600">3. Transport (X →)</text>
<rect x="112" y="30" width="16" height="200" fill="url(#metal)" stroke="#333"/>
<circle cx="120" cy="250" r="7" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/>
<g transform="translate(120,250) rotate(0)">
  <path d="M -38 0 L 38 0 A 38 38 0 0 1 -38 0 Z" fill="url(#metal)" stroke="#222" stroke-width="2"/>
  <path d="M -37.43 0.0 L 37.43 0.0 A 37.43 37.43 0 0 1 -37.43 0.0 Z" fill="url(#powder)" opacity="0.95"/>
  <path d="M 38 0 L 44 -2 L 44 4 L 38 6 Z" fill="#7e8794" stroke="#222" stroke-width="1.2"/>
</g>
<line x1="220" y1="180" x2="320" y2="180" stroke="#1f5fbf" stroke-width="3" marker-end="url(#arrowB)"/><text x="270" y="170" font-size="12" fill="#1f5fbf" text-anchor="middle">X →</text><text x="200" y="320" font-size="10" fill="#444" text-anchor="middle">trough hangs level under gravity</text></g><line x1="1300" y1="280" x2="1335" y2="280" stroke="#222" stroke-width="2.5" marker-end="url(#arrowK)"/><g transform="translate(1340,80)"><text x="200" y="0" text-anchor="middle" font-size="17" font-weight="600">4. Sideways tilt → deposit</text>
<rect x="370" y="160" width="14" height="260" fill="#8a7a5e" stroke="#444"/>
<polygon points="270,300 370,300 370,230 270,300" fill="#8a7a5e" stroke="#444"/>
<text x="320" y="320" text-anchor="middle" font-size="10" fill="#5a4a30">smooth cam ramp</text>
<rect x="112" y="30" width="16" height="200" fill="url(#metal)" stroke="#333"/>
<circle cx="120" cy="250" r="7" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/>
<g transform="translate(120,250) rotate(55)">
  <path d="M -38 0 L 38 0 A 38 38 0 0 1 -38 0 Z" fill="url(#metal)" stroke="#222" stroke-width="2"/>
  <path d="M -37.43 0.0 L 37.43 0.0 A 37.43 37.43 0 0 1 -37.43 0.0 Z" fill="url(#powder)" opacity="0.95"/>
  <path d="M 38 0 L 44 -2 L 44 4 L 38 6 Z" fill="#7e8794" stroke="#222" stroke-width="1.2"/>
</g>
<g fill="url(#powder)" opacity="0.95"><path d="M 305,255 Q 310,310 320,375 L 360,375 Q 370,310 345,255 Z"/></g>
<text x="335" y="395" text-anchor="middle" font-size="11" fill="#7a5a1a">powder pours over the FULL long edge</text>
<line x1="20" y1="100" x2="80" y2="100" stroke="#1f5fbf" stroke-width="3" marker-end="url(#arrowB)"/><text x="50" y="92" text-anchor="middle" font-size="11" fill="#1f5fbf">gantry pushes X →</text><path d="M 90 220 a 36 36 0 0 1 38 -42" fill="none" stroke="#1f5fbf" stroke-width="2.5" marker-end="url(#arrowB)"/><text x="50" y="248" font-size="10" fill="#1f5fbf">trough rolls sideways</text><text x="50" y="262" font-size="10" fill="#1f5fbf">about its long axis</text><text x="160" y="190" font-size="10" fill="#c0392b">bumper rides up cam</text></g><text x="880" y="550" text-anchor="middle" font-size="13" fill="#444" font-style="italic">Pure-X gantry travel works because the smooth cam ramp gives a continuously varying engagement point</text><text x="880" y="570" text-anchor="middle" font-size="13" fill="#444" font-style="italic">(unlike a fixed sawtooth tooth, which is kinematically incompatible with a horizontally-translating pivot — Edison v2 §1).</text></svg>
