<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <linearGradient id="metalH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <pattern id="powder" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#e8d9a8"/>
      <circle cx="1.5" cy="1.5" r="0.6" fill="#b89a55"/>
      <circle cx="4"   cy="3.5" r="0.6" fill="#b89a55"/>
      <circle cx="2"   cy="5"   r="0.5" fill="#b89a55"/>
    </pattern>
    <marker id="arrowK" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5fbf"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
<text x="600" y="34" text-anchor="middle" font-size="22" font-weight="700">Subpanel A — Orthographic views (end, side, top)</text><text x="600" y="56" text-anchor="middle" font-size="13" fill="#555" font-style="italic">longitudinal pivot axis along L; arms grip the two short end caps; trough rolls SIDEWAYS to pour</text><g transform="translate(60,110)"><text x="160" y="0" text-anchor="middle" font-size="16" font-weight="600">End view (along L)</text><rect x="155" y="20" width="10" height="160" fill="url(#metal)" stroke="#333"/><text x="170" y="35" font-size="11" fill="#444">arm (one of two,</text><text x="170" y="49" font-size="11" fill="#444">on the end cap)</text><g transform="translate(160,180) rotate(0)">
  <path d="M -60 0 L 60 0 A 60 60 0 0 1 -60 0 Z" fill="url(#metal)" stroke="#222" stroke-width="2"/>
  <path d="M -59.1 9.0 L 59.1 9.0 A 59.1 59.1 0 0 1 -59.1 9.0 Z" fill="url(#powder)" opacity="0.95"/>
  <path d="M 60 0 L 66 -2 L 66 4 L 60 6 Z" fill="#7e8794" stroke="#222" stroke-width="1.2"/>
</g><circle cx="160" cy="180" r="6" fill="#c0392b" stroke="#7a1f15" stroke-width="1.5"/><text x="172" y="184" font-size="11" fill="#c0392b">pivot pin (end-on)</text><line x1="100" y1="270" x2="220" y2="270" stroke="#222" stroke-width="1.2" marker-start="url(#arrowK)" marker-end="url(#arrowK)"/><text x="160" y="290" text-anchor="middle" font-size="13">D ≈ 27 mm</text></g><g transform="translate(430,110)"><text x="200" y="0" text-anchor="middle" font-size="16" font-weight="600">Side view (looking at long side)</text><rect x="34" y="20" width="12" height="140" fill="url(#metal)" stroke="#333"/><rect x="354" y="20" width="12" height="140" fill="url(#metal)" stroke="#333"/><path d="M 40 140 L 360 140 L 360 150 Q 200.0 200 40 150 Z" fill="url(#metalH)" stroke="#222" stroke-width="2"/><path d="M 50 144 L 350 144 L 350 152 Q 200.0 194 50 152 Z" fill="url(#powder)" opacity="0.95"/><line x1="28" y1="148" x2="372" y2="148" stroke="#c0392b" stroke-width="3"/><text x="200.0" y="142" text-anchor="middle" font-size="11" fill="#c0392b">longitudinal pivot pin (axis ∥ L, runs through both end caps)</text><line x1="40" y1="230" x2="360" y2="230" stroke="#222" stroke-width="1.2" marker-start="url(#arrowK)" marker-end="url(#arrowK)"/><text x="200.0" y="250" text-anchor="middle" font-size="13">L ≈ 3 D ≈ 80 mm</text><path d="M 52 140 L 68 135 L 68 144 L 52 144 Z" fill="#7e8794" stroke="#222" stroke-width="1.2"/><path d="M 348 140 L 364 135 L 364 144 L 348 144 Z" fill="#7e8794" stroke="#222" stroke-width="1.2"/><text x="200.0" y="128" text-anchor="middle" font-size="11" fill="#444">chamfered bumper (one per end) — slides up the cam track</text></g><g transform="translate(880,110)"><text x="130" y="0" text-anchor="middle" font-size="16" font-weight="600">Top view</text><rect x="20" y="40" width="220" height="50" fill="url(#metalH)" stroke="#222" stroke-width="2"/><rect x="26" y="46" width="208" height="38" fill="url(#powder)" opacity="0.95"/><line x1="8" y1="65.0" x2="252" y2="65.0" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6 4"/><text x="130.0" y="108" text-anchor="middle" font-size="11" fill="#c0392b">pivot pin axis (along centre line of trough length)</text><rect x="2" y="34" width="12" height="62" fill="url(#metal)" stroke="#333"/><rect x="234" y="34" width="12" height="62" fill="url(#metal)" stroke="#333"/><text x="-4" y="32" font-size="11" fill="#444">arms grip the two end caps</text><line x1="80.0" y1="140" x2="180.0" y2="140" stroke="#5a4a30" stroke-width="6"/><text x="130.0" y="160" text-anchor="middle" font-size="11" fill="#5a4a30">fixed strike-off bar (bed-edge mounted)</text></g><text x="600" y="660" text-anchor="middle" font-size="13" fill="#444" font-style="italic">The pivot pin runs along the trough's LONG axis L (not across its width).  Arms grip the two end caps,</text><text x="600" y="680" text-anchor="middle" font-size="13" fill="#444" font-style="italic">so when the trough rolls about the pin it pours over the FULL 80 mm long edge — eliminating the narrow-bottleneck</text><text x="600" y="700" text-anchor="middle" font-size="13" fill="#444" font-style="italic">and trapped-volume problems of an end-over-end tilt of a half-cylinder (Edison analysis-v2 §3).</text></svg>
