<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="Helvetica, Arial, sans-serif">
  <!--
    Subpanel A — Orthographic views of the powder-excavator trough +
    arms + pivot pin assembly.

    Front: long edge of the trough seen end-on (i.e. semicircular
    cross-section). Two vertical arms hang past the trough's upper
    rim and a horizontal pivot pin passes through both arms and the
    trough's pivot bosses, just above the centre of mass.

    Side: short edge of the trough (one of the end caps). A single
    arm + the head of the pivot pin are visible.

    Top: looking down on the open mouth of the trough. Both arms
    show as rectangles; the pivot pin is shown as a dashed line
    crossing through both arms and the trough.
  -->
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#dfe4ea"/>
      <stop offset="0.5" stop-color="#aab2bd"/>
      <stop offset="1"   stop-color="#7e8794"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5fbf"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700">
    Subpanel A — Orthographic views (front / side / top)
  </text>

  <!-- ============== FRONT ============== -->
  <g transform="translate(60,90)">
    <text x="140" y="0" text-anchor="middle" font-size="17" font-weight="600">Front</text>

    <!-- two vertical arms (left & right of trough) -->
    <rect x="20"  y="20" width="14" height="120" fill="url(#metal)" stroke="#333"/>
    <rect x="246" y="20" width="14" height="120" fill="url(#metal)" stroke="#333"/>

    <!-- pivot pin: horizontal rod through both arms and trough pivot bosses -->
    <line x1="14" y1="135" x2="266" y2="135" stroke="#c0392b" stroke-width="4"/>
    <circle cx="14"  cy="135" r="4" fill="#c0392b" stroke="#7a1f15"/>
    <circle cx="266" cy="135" r="4" fill="#c0392b" stroke="#7a1f15"/>

    <!-- trough: half cylinder seen end-on -->
    <line x1="40" y1="135" x2="240" y2="135" stroke="#222" stroke-width="2"/>
    <path d="M40,135 A100,100 0 0 0 240,135" fill="url(#metal)" stroke="#222" stroke-width="2"/>
    <path d="M48,135 A92,92 0 0 0 232,135"
          fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- hooked lip on the upper long edge (far side, dashed)
         and near side (solid) -->
    <path d="M40,135 q-6,-4 -6,-12 q0,-2 4,-2"
          fill="none" stroke="#222" stroke-width="2"/>
    <path d="M240,135 q6,-4 6,-12 q0,-2 -4,-2"
          fill="none" stroke="#222" stroke-width="2"/>

    <!-- pivot bosses on the trough sides (small lugs the pin goes through) -->
    <circle cx="40"  cy="135" r="6" fill="#aab2bd" stroke="#333"/>
    <circle cx="240" cy="135" r="6" fill="#aab2bd" stroke="#333"/>

    <!-- D dimension -->
    <line x1="40" y1="260" x2="240" y2="260" stroke="#1f5fbf" stroke-width="1"
          marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
    <text x="140" y="280" text-anchor="middle" font-size="13" fill="#1f5fbf">diameter D</text>

    <!-- callouts -->
    <text x="14"  y="13"  font-size="11" fill="#333">arm L</text>
    <text x="266" y="13"  text-anchor="end" font-size="11" fill="#333">arm R</text>
    <text x="278" y="139" font-size="11" fill="#c0392b">pivot pin</text>
    <text x="280" y="155" font-size="11" fill="#444">(trough rotates here)</text>
  </g>

  <!-- ============== SIDE ============== -->
  <g transform="translate(390,90)">
    <text x="80" y="0" text-anchor="middle" font-size="17" font-weight="600">Side</text>

    <!-- one arm visible (the other is directly behind it) -->
    <rect x="70" y="20" width="14" height="120" fill="url(#metal)" stroke="#333"/>

    <!-- end cap of trough: a rectangle with a rounded bottom -->
    <path d="M30,135 L130,135 L130,205 Q80,255 30,205 Z"
          fill="url(#metal)" stroke="#222" stroke-width="2"/>

    <!-- pivot pin head (end-on) -->
    <circle cx="80" cy="135" r="6" fill="#c0392b" stroke="#7a1f15"/>
    <text x="92" y="139" font-size="11" fill="#c0392b">pivot pin (end-on)</text>

    <!-- L dimension (length is into the page from this view, so just label it) -->
    <line x1="30" y1="270" x2="130" y2="270" stroke="#1f5fbf" stroke-width="1"
          marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
    <text x="80" y="290" text-anchor="middle" font-size="13" fill="#1f5fbf">width D</text>
  </g>

  <!-- ============== TOP ============== -->
  <g transform="translate(610,90)">
    <text x="130" y="0" text-anchor="middle" font-size="17" font-weight="600">Top</text>

    <!-- elongated trough opening -->
    <rect x="10" y="60" width="240" height="80" rx="6" ry="6"
          fill="#f4e9c8" stroke="#222" stroke-width="2"/>
    <rect x="18" y="68" width="224" height="64" rx="4" ry="4"
          fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- two arms seen from above -->
    <rect x="120" y="42" width="14" height="14" fill="url(#metal)" stroke="#333"/>
    <rect x="120" y="144" width="14" height="14" fill="url(#metal)" stroke="#333"/>

    <!-- pivot pin (dashed, into the trough side walls) -->
    <line x1="100" y1="100" x2="160" y2="100"
          stroke="#c0392b" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="170" y="103" font-size="11" fill="#c0392b">pivot pin (hidden)</text>

    <!-- L dim -->
    <line x1="10" y1="170" x2="250" y2="170" stroke="#1f5fbf" stroke-width="1"
          marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
    <text x="130" y="190" text-anchor="middle" font-size="13" fill="#1f5fbf">length L  ≈ 3 D</text>
  </g>

  <!-- caption -->
  <text x="450" y="445" text-anchor="middle" font-size="13" fill="#444" font-style="italic">
    Two vertical arms (red dot = pivot-pin head) hang from the gantry carriage and
    capture the trough between them via a single horizontal pivot pin
  </text>
  <text x="450" y="465" text-anchor="middle" font-size="13" fill="#444" font-style="italic">
    that passes through pivot bosses on both side walls of the trough. The pin sits
    just above the trough's centre of mass so the trough hangs level under gravity.
  </text>
  <text x="450" y="492" text-anchor="middle" font-size="12" fill="#888">
    Hooked lip on each long upper edge (small kink at top of front view) is what later
    catches the sawtooth ledge. L ≈ 3 D, half-cylinder cross-section.
  </text>
</svg>
